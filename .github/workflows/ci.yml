name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run check:schema:ts
      - run: npm run check:schema:json
